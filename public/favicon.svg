<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#07080e"/>
  <!-- Four-leaf clover in neon green -->
  <g transform="translate(32,30)" fill="#00ff88">
    <!-- Top leaf -->
    <ellipse cx="0" cy="-8" rx="7" ry="9" opacity="0.9"/>
    <!-- Bottom leaf -->
    <ellipse cx="0" cy="8" rx="7" ry="9" opacity="0.9"/>
    <!-- Left leaf -->
    <ellipse cx="-8" cy="0" rx="9" ry="7" opacity="0.9"/>
    <!-- Right leaf -->
    <ellipse cx="8" cy="0" rx="9" ry="7" opacity="0.9"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="3" fill="#07080e"/>
    <circle cx="0" cy="0" r="2" fill="#00ff88"/>
  </g>
  <!-- Stem -->
  <line x1="32" y1="37" x2="32" y2="52" stroke="#00cc6a" stroke-width="3" stroke-linecap="round"/>
</svg>
